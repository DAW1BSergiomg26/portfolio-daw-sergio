<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Cyberpunk Menu - Demo</title><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,-apple-system,sans-serif;background:#0a0a0f;color:#e2e8f0;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem}.card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:24px;padding:2rem;max-width:420px;width:100%;text-align:center}h1{font-size:1rem;font-weight:800;text-transform:uppercase;letter-spacing:.15em;margin-bottom:1.5rem;background:linear-gradient(90deg,#ff6b6b,#ffd93d,#6bcb77,#4d96ff,#ff6b6b);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 3s linear infinite}@keyframes shimmer{to{background-position:200% center}}.menu-items{display:flex;flex-direction:column;gap:.5rem;margin-bottom:1.5rem}.menu-item{display:flex;align-items:center;gap:.8rem;padding:.85rem 1.2rem;border-radius:14px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);cursor:pointer;transition:all .2s;text-align:left;font-family:inherit;font-size:.9rem;color:#e2e8f0;font-weight:600}.menu-item:hover{transform:translateX(6px);border-color:currentColor}.menu-item .icon{font-size:1.1rem;width:24px;text-align:center}.menu-item .key{font-size:.65rem;padding:.1rem.35rem;border-radius:4px;background:rgba(255,255,255,.08);margin-left:auto;font-weight:700;color:#94a3b8}.preview{background:rgba(255,255,255,.04);border-radius:14px;padding:1rem;min-height:60px;display:flex;align-items:center;justify-content:center;font-size:.85rem;color:#94a3b8;border:1px dashed rgba(255,255,255,.1)}.preview.active{color:#e2e8f0;border-style:solid;animation:glow 1s ease}@keyframes glow{0%,100%{box-shadow:0 0 0 rgba(255,255,255,0)}50%{box-shadow:0 0 20px rgba(255,255,255,.1)}}</style></head><body><div class="card"><h1>✦ Cyberpunk Menu ✦</h1><div class="menu-items"><button class="menu-item" data-action="inicio" style="color:#ff6b6b"><span class="icon">🏠</span> Inicio<span class="key">⌘1</span></button><button class="menu-item" data-action="proyectos" style="color:#ffd93d"><span class="icon">📁</span> Proyectos<span class="key">⌘2</span></button><button class="menu-item" data-action="servicios" style="color:#6bcb77"><span class="icon">⚡</span> Servicios<span class="key">⌘3</span></button><button class="menu-item" data-action="blog" style="color:#4d96ff"><span class="icon">📝</span> Blog<span class="key">⌘4</span></button><button class="menu-item" data-action="contacto" style="color:#c084fc"><span class="icon">✉️</span> Contacto<span class="key">⌘5</span></button></div><div class="preview" id="preview">Selecciona una opción del menú</div></div><script>const items={inicio:"Bienvenido al sistema — interfaz principal cargada.",proyectos:"Catálogo de 20 proyectos con demos interactivas.",servicios:"Desarrollo web, consultoría técnica y soporte.",blog:"Apuntes técnicos y aprendizajes del ciclo DAW.",contacto:"disponible — sistema de mensajería listo."};document.querySelectorAll('.menu-item').forEach(btn=>{btn.addEventListener('click',()=>{const p=document.getElementById('preview');p.textContent='> '+items[btn.dataset.action];p.classList.remove('active');void p.offsetWidth;p.classList.add('active')})})</script></body></html>
