<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Python de 0 a 100 - Demo</title><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,-apple-system,sans-serif;background:#0f172a;color:#e2e8f0;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem}.card{background:#1e293b;border-radius:24px;padding:2rem;max-width:480px;width:100%}h1{font-size:1.2rem;font-weight:800;margin-bottom:.2rem}h1 span{color:#facc15}.sub{color:#94a3b8;font-size:.82rem;margin-bottom:1.2rem}.path{display:flex;flex-direction:column;gap:.35rem;margin-bottom:1.2rem}.milestone{display:flex;align-items:center;gap:.6rem;padding:.5rem.7rem;border-radius:10px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);cursor:pointer;transition:all .2s;position:relative}.milestone:hover{border-color:rgba(255,255,255,.15);background:rgba(255,255,255,.06)}.milestone .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}.milestone.done .dot{background:#22c55e;box-shadow:0 0 8px rgba(34,197,94,.4)}.milestone.current .dot{background:#facc15;box-shadow:0 0 8px rgba(250,204,21,.4);animation:pulse 1.5s ease-in-out infinite}.milestone .label{font-size:.82rem;font-weight:600;flex:1}.milestone .status{font-size:.65rem;color:#64748b;font-weight:600;text-transform:uppercase}.milestone.done .status{color:#22c55e}.milestone.current .status{color:#facc15}.detail{background:#0f172a;border-radius:14px;padding:1rem;min-height:80px;border:1px solid rgba(255,255,255,.08)}.detail .title{font-size:.85rem;font-weight:700;margin-bottom:.3rem;color:#facc15}.detail .text{font-size:.78rem;color:#94a3b8;line-height:1.6}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}</style></head><body><div class="card"><h1>Python <span>de 0 a 100</span></h1><p class="sub">Ruta de aprendizaje progresivo</p><div class="path" id="milestones"></div><div class="detail" id="detail"><div class="title">👋 ¡Empieza tu viaje!</div><div class="text">Haz clic en cualquier hito para ver más detalles.</div></div></div><script>const milestones=[{label:"Fundamentos",status:"completado",done:true,current:false,detail:"Variables, tipos de datos, operadores y estructuras de control. La base sólida."},{label:"Estructuras",status:"completado",done:true,current:false,detail:"Listas, tuplas, diccionarios, sets y comprensión de colecciones."},{label:"Funciones",status:"completado",done:true,current:false,detail:"Definición, parámetros, return, alcance de variables y funciones lambda."},{label:"POO",status:"en curso",done:false,current:true,detail:"Clases, objetos, herencia, encapsulación y polimorfismo. Estás aquí."},{label:"Módulos",status:"pendiente",done:false,current:false,detail:"Importación, paquetes, pip, entornos virtuales y módulos estándar."},{label:"Proyectos",status:"pendiente",done:false,current:false,detail:"Aplicaciones reales: scripts, APIs simples y automatización con Python."}];const path=document.getElementById('milestones'),detail=document.getElementById('detail');milestones.forEach((m,i)=>{const el=document.createElement('div');el.className='milestone'+(m.done?' done':'')+(m.current?' current':'');el.innerHTML='<div class="dot"></div><span class="label">'+m.label+'</span><span class="status">'+m.status+'</span>';el.onclick=()=>{detail.innerHTML='<div class="title">'+(i+1)+'. '+m.label+'</div><div class="text">'+m.detail+'</div>'};path.appendChild(el)})</script></body></html>
