<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Mini Tienda - Demo</title><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,-apple-system,sans-serif;background:#f8fafc;color:#0f172a;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem}.card{background:#fff;border-radius:24px;padding:2rem;max-width:480px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.06)}.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem}h1{font-size:1.2rem;font-weight:800}.cart-badge{background:#3b82f6;color:#fff;font-size:.7rem;padding:.15rem.5rem;border-radius:999px;font-weight:700}.products{display:grid;gap:.6rem;margin-bottom:1rem}.product{display:flex;align-items:center;gap:.75rem;padding:.8rem 1rem;border-radius:14px;background:#f8fafc;border:1px solid #e2e8f0;transition:all .2s}.product:hover{border-color:#3b82f6;background:#f0f5ff}.product .emoji{font-size:1.5rem;width:36px;text-align:center}.product .info{flex:1}.product .name{font-weight:700;font-size:.85rem}.product .price{font-size:.78rem;color:#64748b}.product .add{padding:.3rem.8rem;border-radius:999px;border:0;background:#3b82f6;color:#fff;font-weight:700;font-size:.75rem;cursor:pointer;transition:background .2s;font-family:inherit}.product .add:hover{background:#2563eb}.product .added{background:#22c55e}.cart{background:#f8fafc;border-radius:16px;padding:1rem;border:1px solid #e2e8f0}.cart-title{font-size:.75rem;text-transform:uppercase;letter-spacing:.08em;color:#64748b;font-weight:700;margin-bottom:.5rem}.cart-item{display:flex;justify-content:space-between;font-size:.82rem;color:#0f172a;padding:.25rem 0}.cart-item .qty{color:#64748b}.cart-total{display:flex;justify-content:space-between;font-weight:800;font-size:.9rem;padding-top:.5rem;border-top:1px solid #e2e8f0;margin-top:.4rem}.cart-empty{text-align:center;color:#94a3b8;font-size:.82rem;padding:.5rem 0}</style></head><body><div class="card"><div class="header"><h1>Mini Tienda</h1><span class="cart-badge" id="cartCount">0</span></div><div class="products" id="products"></div><div class="cart" id="cart"><div class="cart-title">🛒 Carrito</div><div id="cartItems"><div class="cart-empty">Añade productos al carrito</div></div><div class="cart-total"><span>Total</span><span id="totalCart">0,00 €</span></div></div></div><script>const items=[{name:"Auriculares Bluetooth",price:29.99,emoji:"🎧"},{name:"Teclado Mecánico",price:59.99,emoji:"⌨️"},{name:"Ratón Inalámbrico",price:24.99,emoji:"🖱️"},{name:"Base Portátil",price:34.99,emoji:"💻"},{name:"Cable USB-C",price:9.99,emoji:"🔌"}];let cart={};const prodEl=document.getElementById('products'),cartItems=document.getElementById('cartItems'),cartCount=document.getElementById('cartCount'),totalEl=document.getElementById('totalCart');function renderProducts(){prodEl.innerHTML=items.map((p,i)=>'<div class="product"><div class="emoji">'+p.emoji+'</div><div class="info"><div class="name">'+p.name+'</div><div class="price">'+p.price.toFixed(2)+' €</div></div><button class="add" data-idx="'+i+'">Añadir</button></div>').join('');document.querySelectorAll('.add').forEach(btn=>{btn.onclick=()=>{const idx=parseInt(btn.dataset.idx);const p=items[idx];cart[p.name]=(cart[p.name]||0)+1;renderCart();btn.textContent='✓';btn.classList.add('added');setTimeout(()=>{btn.textContent='Añadir';btn.classList.remove('added')},800)}})}function renderCart(){const entries=Object.entries(cart);const total=entries.reduce((s,[n,q])=>s+items.find(i=>i.name===n).price*q,0);cartItems.innerHTML=entries.length?entries.map(([n,q])=>'<div class="cart-item"><span>'+n+' <span class="qty">x'+q+'</span></span><span>'+(items.find(i=>i.name===n).price*q).toFixed(2)+' €</span></div>').join(''):'<div class="cart-empty">Añade productos al carrito</div>';cartCount.textContent=entries.reduce((s,[,q])=>s+q,0);totalEl.textContent=total.toFixed(2)+' €'}renderProducts()</script></body></html>
