<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Moonwalk Archive - Demo</title><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,-apple-system,sans-serif;background:#0f172a;color:#e2e8f0;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem}.card{background:#1e293b;border-radius:20px;padding:2rem;max-width:480px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.4)}h1{font-size:1.3rem;font-weight:800;letter-spacing:-.02em;display:flex;align-items:center;gap:.5rem;margin-bottom:.3rem}h1 span{font-size:.65rem;background:#3b82f6;color:#fff;padding:.15rem.45rem;border-radius:6px;font-weight:700}.sub{color:#94a3b8;font-size:.82rem;margin-bottom:1.5rem}.grid{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-bottom:1.5rem}.item{background:#0f172a;border-radius:12px;padding:.9rem;text-align:center;cursor:pointer;transition:transform .2s,background .2s;border:1px solid rgba(255,255,255,.06)}.item:hover{transform:translateY(-2px);background:#1e293b}.item .icon{font-size:1.3rem;display:block;margin-bottom:.25rem}.item .name{font-size:.75rem;font-weight:600;color:#94a3b8}.section-title{font-size:.7rem;text-transform:uppercase;letter-spacing:.1em;color:#64748b;font-weight:700;margin-bottom:.6rem}.list{display:flex;flex-wrap:wrap;gap:.3rem}.list span{padding:.2rem.5rem;border-radius:6px;background:rgba(59,130,246,.15);color:#93c5fd;font-size:.72rem;font-weight:600}.status{display:flex;justify-content:space-between;align-items:center;padding-top:1rem;border-top:1px solid rgba(255,255,255,.08);font-size:.8rem;color:#94a3b8}.status strong{color:#22c55e}</style></head><body><div class="card"><h1>Moonwalk Archive <span>v1.0.0</span></h1><p class="sub">Web cultural documental con 8 secciones temáticas</p><div class="grid"><div class="item"><span class="icon">📖</span><span class="name">Biografía</span></div><div class="item"><span class="icon">🎵</span><span class="name">Discografía</span></div><div class="item"><span class="icon">🎬</span><span class="name">Videografía</span></div><div class="item"><span class="icon">🎤</span><span class="name">Conciertos</span></div><div class="item"><span class="icon">📺</span><span class="name">Documentales</span></div><div class="item"><span class="icon">🔍</span><span class="name">Curiosidades</span></div><div class="item"><span class="icon">🏛️</span><span class="name">Museo</span></div><div class="item"><span class="icon">⚖️</span><span class="name">Fuentes</span></div></div><div class="section-title">Tecnologías</div><div class="list" style="margin-bottom:1rem"><span>HTML5</span><span>CSS3</span><span>JavaScript</span><span>GitHub Pages</span><span>SEO</span></div><div class="status"><span>📄 Memoria técnica DAW</span><strong>● Publicado</strong></div></div></body></html>
