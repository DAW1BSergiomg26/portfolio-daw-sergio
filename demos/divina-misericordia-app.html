<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Divina Misericordia - Demo</title><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,-apple-system,sans-serif;background:linear-gradient(135deg,#0f172a,#1a1a2e);color:#e2e8f0;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem}.card{background:#1e293b;border-radius:24px;padding:2rem;max-width:400px;width:100%;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.4)}h1{font-size:1.2rem;font-weight:800;margin-bottom:.3rem;color:#fbbf24}.sub{color:#94a3b8;font-size:.8rem;margin-bottom:1.5rem}.flip-card{perspective:600px;margin-bottom:1.2rem;cursor:pointer}.flip-inner{background:linear-gradient(135deg,#fbbf24,#f59e0b);border-radius:20px;padding:2.5rem 1.5rem;transition:transform .4s;min-height:180px;display:flex;flex-direction:column;align-items:center;justify-content:center}.flip-inner.flipped{transform:rotateY(180deg)}.flip-inner .front,.flip-inner .back{backface-visibility:hidden;width:100%}.flip-inner .back{display:none}.flip-inner.flipped .front{display:none}.flip-inner.flipped .back{display:block;transform:rotateY(180deg)}.virtue{font-size:1.1rem;font-weight:800;color:#0f172a;margin-bottom:.4rem}.verse{font-size:.85rem;color:#1e293b;line-height:1.5}.action-btn{display:inline-block;padding:.5rem 1.4rem;border-radius:999px;border:0;background:#3b82f6;color:#fff;font-weight:700;font-size:.85rem;cursor:pointer;transition:background .2s;font-family:inherit;margin:.3rem}.action-btn:hover{background:#2563eb}.action-btn.outline{background:transparent;border:1px solid rgba(255,255,255,.2);color:#e2e8f0}.counter{font-size:.78rem;color:#64748b;margin-top:.8rem}</style></head><body><div class="card"><h1>Divina Misericordia</h1><p class="sub">Tarjetas de virtudes y reflexión</p><div class="flip-card" id="flipCard"><div class="flip-inner" id="flipInner"><div class="front"><div class="virtue" id="virtueText">Misericordia</div><div class="verse" id="verseText">"Bienaventurados los misericordiosos, porque ellos alcanzarán misericordia."</div></div><div class="back"><div class="virtue" style="color:#0f172a">Reflexión</div><div class="verse" id="reflectText">La misericordia es el arte de mirar con el corazón, de perdonar sin condiciones y de amar sin límites.</div></div></div></div><div><button class="action-btn" id="nextBtn">Siguiente virtud</button><button class="action-btn outline" id="flipBtn">Dar la vuelta</button></div><div class="counter" id="counter">1 / 6</div></div><script>const cards=[{virtue:"Misericordia",verse:"Bienaventurados los misericordiosos, porque ellos alcanzarán misericordia.",reflect:"La misericordia es el arte de mirar con el corazón."},{virtue:"Esperanza",verse:"La esperanza no defrauda, porque el amor de Dios ha sido derramado en nuestros corazones.",reflect:"La esperanza es la luz que brilla incluso en la noche más oscura."},{virtue:"Fe",verse:"Todo es posible para el que cree.",reflect:"La fe es la certeza de lo que se espera, la convicción de lo que no se ve."},{virtue:"Humildad",verse:"Dios resiste a los soberbios, pero da gracia a los humildes.",reflect:"La humildad no es pensar menos de ti mismo, sino pensar en ti mismo menos."},{virtue:"Paz",verse:"La paz os dejo, mi paz os doy; no os la doy como el mundo la da.",reflect:"La paz interior es el mayor de los tesoros, el refugio del alma."},{virtue:"Amor",verse:"El amor todo lo puede, todo lo cree, todo lo espera, todo lo soporta.",reflect:"El amor es la fuerza más poderosa del universo, la que mueve el mundo."}];let idx=0;const ve=document.getElementById('virtueText'),vs=document.getElementById('verseText'),re=document.getElementById('reflectText'),ct=document.getElementById('counter'),fi=document.getElementById('flipInner');function render(){const c=cards[idx];ve.textContent=c.virtue;vs.textContent='"'+c.verse+'"';re.textContent=c.reflect;ct.textContent=(idx+1)+' / '+cards.length;fi.classList.remove('flipped')}document.getElementById('nextBtn').onclick=()=>{idx=(idx+1)%cards.length;render()};document.getElementById('flipBtn').onclick=()=>{fi.classList.toggle('flipped')};</script></body></html>
