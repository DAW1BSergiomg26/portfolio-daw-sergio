<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>100 Ejercicios - Demo</title><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,-apple-system,sans-serif;background:#0f172a;color:#e2e8f0;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem}.card{background:#1e293b;border-radius:24px;padding:2rem;max-width:480px;width:100%}h1{font-size:1.2rem;font-weight:800;margin-bottom:.2rem}h1 span{color:#22c55e}.sub{color:#94a3b8;font-size:.82rem;margin-bottom:1.2rem}.progress{display:flex;align-items:center;gap:.6rem;margin-bottom:1rem}.bar{flex:1;height:6px;border-radius:999px;background:rgba(255,255,255,.1);overflow:hidden}.bar-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,#22c55e,#16a34a);transition:width .4s ease;width:0}.pct-text{font-size:.8rem;font-weight:700;color:#22c55e;min-width:40px;text-align:right}.exercise{background:#0f172a;border-radius:14px;padding:1.2rem;margin-bottom:1rem;border:1px solid rgba(255,255,255,.08)}.exercise .num{font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;color:#64748b;font-weight:700;margin-bottom:.3rem}.exercise .q{font-weight:600;font-size:.85rem;margin-bottom:.6rem;line-height:1.5}.exercise .answer{font-size:.8rem;color:#94a3b8;line-height:1.6;display:none;background:rgba(34,197,94,.08);padding:.6rem.8rem;border-radius:10px;margin-top:.4rem}.exercise .answer.show{display:block}.exercise .toggle{padding:.3rem.8rem;border-radius:999px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:#94a3b8;font-size:.72rem;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit}.exercise .toggle:hover{color:#e2e8f0;border-color:rgba(255,255,255,.2)}.nav{display:flex;gap:.5rem;justify-content:center;flex-wrap:wrap}.nav button{padding:.35rem.8rem;border-radius:999px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:#94a3b8;font-size:.75rem;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit}.nav button:hover{color:#e2e8f0;background:rgba(255,255,255,.08)}</style></head><body><div class="card"><h1>🧪 100 <span>Ejercicios</span></h1><p class="sub">Práctica diaria de lógica de programación</p><div class="progress"><div class="bar"><div class="bar-fill" id="barFill" style="width:12%"></div></div><span class="pct-text" id="pctText">12%</span></div><div class="exercise" id="exerciseContainer"></div><div class="nav"><button id="prevBtn">← Anterior</button><button id="nextBtn">Siguiente →</button></div></div><script>const exercises=[{q:"Escribe una función que sume dos números.",a:"function sumar(a, b) { return a + b; }"},{q:"Crea un array con 5 números y calcula su media.",a:"const nums = [4, 8, 15, 16, 23]; const media = nums.reduce((a,b)=>a+b,0) / nums.length;"},{q:"Escribe un condicional que determine si un número es par o impar.",a:"if (num % 2 === 0) { console.log('Par'); } else { console.log('Impar'); }"},{q:"Crea un bucle que imprima los números del 1 al 10.",a:"for (let i = 1; i <= 10; i++) { console.log(i); }"},{q:"Escribe una función que invierta una cadena de texto.",a:"function invertir(str) { return str.split('').reverse().join(''); }"},{q:"Crea un objeto persona con nombre, edad y ciudad.",a:"const persona = { nombre: 'Sergio', edad: 25, ciudad: 'Oviedo' };"},{q:"Filtra los números mayores de 10 de un array.",a:"const nums = [3, 15, 7, 22, 1]; const filtrados = nums.filter(n => n > 10);"},{q:"Escribe una función que cuente las vocales de un texto.",a:"function contarVocales(t) { return (t.match(/[aeiou]/gi) || []).length; }"}];let idx=0;const container=document.getElementById('exerciseContainer'),bar=document.getElementById('barFill'),pct=document.getElementById('pctText');function render(){const ex=exercises[idx];const done=Math.round(((idx+1)/exercises.length)*100);container.innerHTML='<div class="num">Ejercicio '+(idx+1)+' de '+exercises.length+'</div><div class="q">'+ex.q+'</div><button class="toggle" id="toggleAns">Ver solución</button><div class="answer" id="answer">'+ex.a+'</div>';document.getElementById('toggleAns').onclick=()=>document.getElementById('answer').classList.toggle('show');bar.style.width=done+'%';pct.textContent=done+'%'}document.getElementById('prevBtn').onclick=()=>{idx=(idx-1+exercises.length)%exercises.length;render()};document.getElementById('nextBtn').onclick=()=>{idx=(idx+1)%exercises.length;render()};render()</script></body></html>
