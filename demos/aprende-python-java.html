<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Aprende Python/Java - Demo</title><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,-apple-system,sans-serif;background:#0f172a;color:#e2e8f0;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem}.card{background:#1e293b;border-radius:24px;padding:2rem;max-width:520px;width:100%}h1{font-size:1.2rem;font-weight:800;margin-bottom:.2rem}.sub{color:#94a3b8;font-size:.82rem;margin-bottom:1.2rem}.tabs{display:flex;gap:.25rem;margin-bottom:1rem;padding:.2rem;background:rgba(255,255,255,.04);border-radius:999px;border:1px solid rgba(255,255,255,.08);width:fit-content}.tab{padding:.35rem.9rem;border-radius:999px;border:0;background:transparent;color:#94a3b8;font-weight:700;font-size:.78rem;cursor:pointer;transition:all .2s;font-family:inherit}.tab.active{background:#3b82f6;color:#fff}.tab:hover:not(.active){color:#e2e8f0}.code-block{background:#0f172a;border-radius:14px;padding:1rem;margin-bottom:1rem;font-family:'Courier New',monospace;font-size:.8rem;line-height:1.6;overflow-x:auto;border:1px solid rgba(255,255,255,.08)}.code-block .comment{color:#64748b}.code-block .keyword{color:#93c5fd}.code-block .string{color:#22c55e}.code-block .number{color:#facc15}.desc{font-size:.82rem;color:#94a3b8;line-height:1.6;margin-bottom:1rem}.example-nav{display:flex;gap:.4rem;flex-wrap:wrap}.example-nav button{padding:.3rem.7rem;border-radius:999px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:#94a3b8;font-size:.72rem;cursor:pointer;transition:all .2s;font-family:inherit}.example-nav button.active{background:rgba(59,130,246,.2);color:#93c5fd;border-color:#3b82f6}</style></head><body><div class="card"><h1>📚 Python · Java</h1><p class="sub">Compara la sintaxis de ambos lenguajes</p><div class="tabs"><button class="tab active" data-lang="py">Python</button><button class="tab" data-lang="java">Java</button></div><div class="desc" id="desc">Estructura básica de un programa</div><div class="code-block" id="codeBlock"></div><div class="example-nav" id="exNav"></div></div><script>const examples={py:[{name:"Hola Mundo",desc:"Estructura básica de un programa",code:'<span class="keyword">print</span>(<span class="string">"¡Hola, Mundo!"</span>)'},{name:"Variables",desc:"Declaración y tipos básicos",code:'nombre = <span class="string">"Sergio"</span>\nedad = <span class="number">25</span>\nnota = <span class="number">8.5</span>\n<span class="keyword">print</span>(<span class="string">f"Hola {nombre}"</span>)'},{name:"Condicional",desc:"Estructura if/elif/else",code:'edad = <span class="number">18</span>\n<span class="keyword">if</span> edad >= <span class="number">18</span>:\n    <span class="keyword">print</span>(<span class="string">"Mayor de edad"</span>)\n<span class="keyword">else</span>:\n    <span class="keyword">print</span>(<span class="string">"Menor de edad"</span>)'},{name:"Listas",desc:"Arrays dinámicos en Python",code:'frutas = [<span class="string">"manzana"</span>, <span class="string">"pera"</span>, <span class="string">"uva"</span>]\n<span class="keyword">for</span> fruta <span class="keyword">in</span> frutas:\n    <span class="keyword">print</span>(fruta.upper())'}],java:[{name:"Hola Mundo",desc:"Estructura básica de un programa",code:'<span class="keyword">public class</span> Main {\n    <span class="keyword">public static void</span> main(String[] args) {\n        System.out.println(<span class="string">"¡Hola, Mundo!"</span>);\n    }\n}'},{name:"Variables",desc:"Declaración y tipos básicos",code:'String nombre = <span class="string">"Sergio"</span>;\n<span class="keyword">int</span> edad = <span class="number">25</span>;\n<span class="keyword">double</span> nota = <span class="number">8.5</span>;\nSystem.out.println(<span class="string">"Hola "</span> + nombre);'},{name:"Condicional",desc:"Estructura if/else",code:'<span class="keyword">int</span> edad = <span class="number">18</span>;\n<span class="keyword">if</span> (edad >= <span class="number">18</span>) {\n    System.out.println(<span class="string">"Mayor de edad"</span>);\n} <span class="keyword">else</span> {\n    System.out.println(<span class="string">"Menor de edad"</span>);\n}'},{name:"ArrayList",desc:"Arrays dinámicos en Java",code:'<span class="keyword">import</span> java.util.ArrayList;\n\nArrayList&lt;String&gt; frutas = <span class="keyword">new</span> ArrayList&lt;&gt;();\nfrutas.add(<span class="string">"manzana"</span>);\nfrutas.add(<span class="string">"pera"</span>);\n<span class="keyword">for</span> (String f : frutas) {\n    System.out.println(f.toUpperCase());\n}'}];let lang='py',exIdx=0;const codeEl=document.getElementById('codeBlock'),descEl=document.getElementById('desc'),navEl=document.getElementById('exNav');function render(){const exs=examples[lang];const ex=exs[exIdx];codeEl.innerHTML=ex.code;descEl.textContent=ex.desc;navEl.innerHTML=exs.map((e,i)=>'<button class="'+(i===exIdx?'active':'')+'" data-idx="'+i+'">'+e.name+'</button>').join('');navEl.querySelectorAll('button').forEach(b=>{b.onclick=()=>{exIdx=parseInt(b.dataset.idx);render()}})}document.querySelectorAll('.tab').forEach(tab=>{tab.onclick=()=>{document.querySelector('.tab.active').classList.remove('active');tab.classList.add('active');lang=tab.dataset.lang;exIdx=0;render()}});render()</script></body></html>
