<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>DinoGamer - Demo</title><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,-apple-system,sans-serif;background:#0f172a;color:#e2e8f0;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem}.card{background:#1e293b;border-radius:24px;padding:2rem;max-width:420px;width:100%;text-align:center}h1{font-size:1.3rem;font-weight:800;margin-bottom:.2rem}h1 span{color:#22c55e}.sub{color:#94a3b8;font-size:.8rem;margin-bottom:1.2rem}.game-area{background:#0f172a;border-radius:16px;padding:1rem;margin-bottom:1rem;position:relative;overflow:hidden;height:180px;border:1px solid rgba(255,255,255,.08)}.dino{position:absolute;bottom:20px;left:20px;font-size:2rem;transition:bottom .15s;user-select:none}.dino.jump{bottom:80px}.obstacle{position:absolute;bottom:20px;right:-30px;font-size:1.5rem;transition:right .02s linear;user-select:none}.score{font-size:2rem;font-weight:900;color:#3b82f6;margin-bottom:.3rem}.hiscore{font-size:.78rem;color:#64748b;margin-bottom:1rem}.controls{display:flex;gap:.5rem;justify-content:center}.controls button{padding:.5rem 1.5rem;border-radius:999px;border:0;font-weight:700;font-size:.85rem;cursor:pointer;transition:all .2s;font-family:inherit}.start-btn{background:#22c55e;color:#0f172a}.start-btn:hover{background:#16a34a}.reset-btn{background:rgba(255,255,255,.08);color:#e2e8f0}.reset-btn:hover{background:rgba(255,255,255,.12)}.tip{font-size:.72rem;color:#64748b;margin-top:.6rem}</style></head><body><div class="card"><h1>Dino<span>Gamer</span></h1><p class="sub">Salta los obstáculos, sobrevive el máximo tiempo</p><div class="game-area" id="gameArea"><div class="dino" id="dino">🦖</div></div><div class="score" id="score">0</div><div class="hiscore" id="hiscore">🏆 Mejor: 0</div><div class="controls"><button class="start-btn" id="startBtn">▶ Iniciar</button><button class="reset-btn" id="resetBtn">↻ Reiniciar</button></div><p class="tip">Espacio o clic para saltar</p></div><script>let running=false,score=0,hi=parseInt(localStorage.getItem('dinohi')||'0'),obstacle=null,interval=null,jumpTimer=null;const dino=document.getElementById('dino'),scoreEl=document.getElementById('score'),hiEl=document.getElementById('hiscore'),area=document.getElementById('gameArea');hiEl.textContent='🏆 Mejor: '+hi;function jump(){if(!running||dino.classList.contains('jump'))return;dino.classList.add('jump');clearTimeout(jumpTimer);jumpTimer=setTimeout(()=>dino.classList.remove('jump'),300)}function spawn(){if(!running)return;const obs=document.createElement('div');obs.className='obstacle';obs.textContent=['🌵','🪨','🌴','🔥'][Math.floor(Math.random()*4)];obs.style.right='-30px';area.appendChild(obs);obstacle=obs;let pos=-30;const moveInterval=setInterval(()=>{if(!running){clearInterval(moveInterval);obs.remove();return}pos+=2;obs.style.right=pos+'px';if(pos>area.offsetWidth+30){clearInterval(moveInterval);obs.remove();score++;scoreEl.textContent=score;spawn()}const dinoRect=dino.getBoundingClientRect(),obsRect=obs.getBoundingClientRect();if(dinoRect.right-10>obsRect.left+5&&dinoRect.left+10<obsRect.right-5&&dinoRect.bottom-10>obsRect.top+5){clearInterval(moveInterval);gameOver()}},30)}function gameOver(){running=false;clearInterval(interval);if(obstacle){obstacle.remove();obstacle=null}if(score>hi){hi=score;localStorage.setItem('dinohi',hi);hiEl.textContent='🏆 Mejor: '+hi}document.getElementById('startBtn').textContent='▶ Reintentar'}document.getElementById('startBtn').onclick=()=>{if(running)return;running=true;score=0;scoreEl.textContent='0';document.getElementById('startBtn').textContent='▶ Jugando...';if(obstacle){obstacle.remove();obstacle=null}setTimeout(spawn,500)};document.getElementById('resetBtn').onclick=()=>{gameOver();score=0;scoreEl.textContent='0'};document.addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault();jump()}});area.addEventListener('click',jump)</script></body></html>
