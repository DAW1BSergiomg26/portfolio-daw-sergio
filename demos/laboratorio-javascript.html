<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>JS Lab - Demo</title><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,-apple-system,sans-serif;background:#0f172a;color:#e2e8f0;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem}.card{background:#1e293b;border-radius:24px;padding:2rem;max-width:480px;width:100%}h1{font-size:1.2rem;font-weight:800;margin-bottom:.3rem}h1 span{color:#facc15}.sub{color:#94a3b8;font-size:.82rem;margin-bottom:1.2rem}.experiments{display:flex;gap:.4rem;margin-bottom:1rem;flex-wrap:wrap}.exp-btn{padding:.35rem.8rem;border-radius:999px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:#94a3b8;font-size:.75rem;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit}.exp-btn.active{background:#facc15;color:#0f172a;border-color:#facc15}.exp-btn:hover:not(.active){color:#e2e8f0}.workspace{background:#0f172a;border-radius:16px;padding:1.2rem;min-height:140px;border:1px solid rgba(255,255,255,.08);margin-bottom:1rem;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.6rem;text-align:center}.workspace .result{font-size:1.8rem;font-weight:900;color:#facc15}.workspace .result.small{font-size:1rem}.workspace .hint{font-size:.78rem;color:#64748b}.workspace input{padding:.5rem .8rem;border-radius:10px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.05);color:#e2e8f0;font-size:.9rem;width:100px;text-align:center;font-family:inherit;outline:0}.workspace input:focus{border-color:#facc15}.workspace button{padding:.4rem 1rem;border-radius:999px;border:0;background:#3b82f6;color:#fff;font-weight:700;font-size:.8rem;cursor:pointer;font-family:inherit;transition:background .2s}.workspace button:hover{background:#2563eb}.code{font-size:.72rem;color:#64748b;font-family:monospace;background:#0f172a;padding:.4rem.7rem;border-radius:8px;white-space:pre-wrap;word-break:break-all;border:1px solid rgba(255,255,255,.06)}</style></head><body><div class="card"><h1>JS <span>Laboratory</span></h1><p class="sub">Experimenta con JavaScript en vivo</p><div class="experiments" id="expList"></div><div class="workspace" id="workspace"></div><div class="code" id="codeView"></div></div><script>const experiments=[{name:"Contador",html:'<div class="result" id="countDisplay">0</div><button id="countBtn">Incrementar</button><button id="resetBtn" style="background:rgba(255,255,255,.08);color:#e2e8f0">Reset</button>',js:()=>{let c=0;const d=document.getElementById('countDisplay'),b=document.getElementById('countBtn'),r=document.getElementById('resetBtn');b.onclick=()=>{c++;d.textContent=c};r.onclick=()=>{c=0;d.textContent='0'}},code:'let count = 0;\ncountBtn.onclick = () => count++;\nresetBtn.onclick = () => count = 0;'},{name:"Array Map",html:'<div class="result small" id="arrDisplay">[1, 2, 3, 4, 5]</div><button id="mapBtn">Multiplicar x2</button>',js:()=>{let arr=[1,2,3,4,5];const d=document.getElementById('arrDisplay'),b=document.getElementById('mapBtn');b.onclick=()=>{arr=arr.map(n=>n*2);d.textContent='['+arr.join(', ')+']'}},code:'let arr = [1,2,3,4,5];\narr = arr.map(n => n * 2);'},{name:"Template String",html:'<input id="nameInput" placeholder="Tu nombre"><div class="result small" id="greetDisplay" style="font-size:.9rem;color:#94a3b8;min-height:1.5em"></div>',js:()=>{const inp=document.getElementById('nameInput'),d=document.getElementById('greetDisplay');inp.oninput=()=>{d.textContent=inp.value.trim()?'¡Hola, '+inp.value.trim()+'! Bienvenido al lab.':'',d.style.color='#94a3b8'}},code:'const name = prompt("Tu nombre");\nconsole.log(`¡Hola, ${name}!`);'},{name:"Destructuring",html:'<div class="result small" id="destructDisplay" style="font-size:.85rem;line-height:1.6">usuario: Sergio<br>rol: Admin<br>edad: 25</div><button id="switchBtn">Cambiar usuario</button>',js:()=>{const users=[{name:"Sergio",role:"Admin",age:25},{name:"Ana",role:"Editor",age:30},{name:"Carlos",role:"Viewer",age:22}];let i=0;const d=document.getElementById('destructDisplay'),b=document.getElementById('switchBtn');b.onclick=()=>{i=(i+1)%users.length;const{name:n,role:r,age:a}=users[i];d.innerHTML='usuario: '+n+'<br>rol: '+r+'<br>edad: '+a}},code:'const { name, role, age } = user;\nconsole.log(name, role, age);'}];let activeIdx=0;function renderExp(idx){const exp=experiments[idx];const ws=document.getElementById('workspace');ws.innerHTML=exp.html;if(exp.js)exp.js();document.getElementById('codeView').textContent='// '+exp.name+'\n'+exp.code;document.querySelectorAll('.exp-btn').forEach((b,i)=>b.classList.toggle('active',i===idx))}const list=document.getElementById('expList');experiments.forEach((e,i)=>{const btn=document.createElement('button');btn.className='exp-btn'+(i===0?' active':'');btn.textContent=e.name;btn.onclick=()=>{activeIdx=i;renderExp(i)};list.appendChild(btn)});renderExp(0)</script></body></html>
