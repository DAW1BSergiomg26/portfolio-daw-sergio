<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>SQL Lab - Demo</title><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,-apple-system,sans-serif;background:#0f172a;color:#e2e8f0;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem}.card{background:#1e293b;border-radius:24px;padding:2rem;max-width:520px;width:100%}h1{font-size:1.2rem;font-weight:800;margin-bottom:.3rem}h1 span{color:#3b82f6}.sub{color:#94a3b8;font-size:.82rem;margin-bottom:1.2rem}.query{padding:.6rem.8rem;background:#0f172a;border-radius:10px;font-family:monospace;font-size:.8rem;margin-bottom:.8rem;border-left:3px solid #3b82f6;color:#93c5fd;white-space:pre-wrap;line-height:1.5;min-height:40px}.btn-group{display:flex;gap:.4rem;margin-bottom:1rem;flex-wrap:wrap}.btn-group button{padding:.35rem.8rem;border-radius:999px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:#94a3b8;font-size:.75rem;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit}.btn-group button.active{background:#3b82f6;color:#fff;border-color:#3b82f6}.table{background:#0f172a;border-radius:12px;overflow:hidden;border:1px solid rgba(255,255,255,.08)}table{width:100%;border-collapse:collapse;font-size:.78rem}th{background:rgba(59,130,246,.15);color:#93c5fd;padding:.5rem.6rem;text-align:left;font-weight:700;text-transform:uppercase;letter-spacing:.05em;font-size:.7rem}td{padding:.45rem.6rem;border-top:1px solid rgba(255,255,255,.06);color:#e2e8f0}.highlight{color:#facc15;font-weight:700}.status{font-size:.72rem;color:#64748b;margin-top:.6rem;font-family:monospace}</style></head><body><div class="card"><h1>SQL <span>Laboratory</span></h1><p class="sub">Consultas a la base de datos de ejemplo</p><div class="query" id="queryDisplay">SELECT * FROM productos;</div><div class="btn-group"><button class="active" data-q="0">Todos</button><button data-q="1">Filtrar</button><button data-q="2">Agrupar</button><button data-q="3">Ordenar</button></div><div class="table" id="tableContainer"></div><div class="status" id="status">→ 5 resultados en 2ms</div></div><script>const queries=[{sql:"SELECT * FROM productos;",label:"Todos",data:[{id:1,nombre:"Portátil ASUS",precio:899,cat:"Informática",stock:12},{id:2,nombre:"Monitor 27\"",precio:349,cat:"Informática",stock:8},{id:3,nombre:"Teclado RGB",precio:89,cat:"Periféricos",stock:25},{id:4,nombre:"Ratón Pro",precio:59,cat:"Periféricos",stock:30},{id:5,nombre:"Webcam HD",precio:79,cat:"Periféricos",stock:15}]},{sql:"SELECT * FROM productos WHERE precio < 100 ORDER BY precio;",label:"Filtrar",data:[{id:3,nombre:"Teclado RGB",precio:89,cat:"Periféricos",stock:25},{id:4,nombre:"Ratón Pro",precio:59,cat:"Periféricos",stock:30},{id:5,nombre:"Webcam HD",precio:79,cat:"Periféricos",stock:15}]},{sql:"SELECT categoria, COUNT(*) as total, AVG(precio) as media FROM productos GROUP BY categoria;",label:"Agrupar",data:[{cat:"Informática",total:2,media:624},{cat:"Periféricos",total:3,media:75.67}]},{sql:"SELECT * FROM productos ORDER BY precio DESC LIMIT 3;",label:"Ordenar",data:[{id:1,nombre:"Portátil ASUS",precio:899,cat:"Informática",stock:12},{id:2,nombre:"Monitor 27\"",precio:349,cat:"Informática",stock:8},{id:3,nombre:"Teclado RGB",precio:89,cat:"Periféricos",stock:25}]}];let active=0;function renderTable(idx){const q=queries[idx];document.getElementById('queryDisplay').textContent=q.sql;const cols=Object.keys(q.data[0]||{});const container=document.getElementById('tableContainer');container.innerHTML='<table><thead><tr>'+cols.map(c=>'<th>'+c+'</th>').join('')+'</tr></thead><tbody>'+q.data.map(row=>'<tr>'+cols.map(c=>'<td'+(c==='precio'?' class="highlight"':'')+'>'+row[c]+'</td>').join('')+'</tr>').join('')+'</tbody></table>';document.getElementById('status').textContent='→ '+q.data.length+' resultados | '+q.sql.slice(0,40)+'...';document.querySelectorAll('.btn-group button').forEach((b,i)=>b.classList.toggle('active',i===idx))}document.querySelectorAll('.btn-group button').forEach((btn,i)=>{btn.onclick=()=>{active=i;renderTable(i)}});renderTable(0)</script></body></html>
