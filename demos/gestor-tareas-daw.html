<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Gestor de Tareas - Demo</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f8fafc;color:#0f172a;padding:2rem;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#fff;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,.08);padding:2rem;width:100%;max-width:420px}
h1{font-size:1.25rem;font-weight:700;margin-bottom:1.25rem;display:flex;align-items:center;gap:.5rem}
h1 span{background:#6366f1;color:#fff;font-size:.7rem;padding:.15rem .5rem;border-radius:999px;font-weight:600}
.add-task{display:flex;gap:.5rem;margin-bottom:1.25rem}
.add-task input{flex:1;padding:.6rem .9rem;border:1px solid #e2e8f0;border-radius:10px;font-size:.9rem;outline:0;transition:border .2s}
.add-task input:focus{border-color:#6366f1}
.add-task button{padding:.6rem 1rem;background:#6366f1;color:#fff;border:0;border-radius:10px;font-weight:600;font-size:.85rem;cursor:pointer;transition:background .2s}
.add-task button:hover{background:#4f46e5}
.filters{display:flex;gap:.35rem;margin-bottom:1rem;flex-wrap:wrap}
.filters button{padding:.3rem .7rem;border:1px solid #e2e8f0;border-radius:999px;background:0;font-size:.78rem;cursor:pointer;transition:all .2s;color:#64748b}
.filters button.active{background:#6366f1;color:#fff;border-color:#6366f1}
.task-count{font-size:.78rem;color:#94a3b8;margin-bottom:.75rem}
.task-list{list-style:none;display:flex;flex-direction:column;gap:.35rem}
.task-item{display:flex;align-items:center;gap:.5rem;padding:.5rem .75rem;border-radius:10px;background:#f8fafc;transition:background .2s}
.task-item:hover{background:#f1f5f9}
.task-item.done label{text-decoration:line-through;color:#94a3b8}
.task-item input[type=checkbox]{width:1rem;height:1rem;accent-color:#6366f1;cursor:pointer;flex-shrink:0}
.task-item label{flex:1;font-size:.88rem;cursor:pointer}
.task-item .del{background:0;border:0;color:#94a3b8;cursor:pointer;font-size:1rem;padding:.1rem .3rem;border-radius:6px;transition:all .2s;line-height:1}
.task-item .del:hover{color:#ef4444;background:#fee2e2}
.empty{text-align:center;padding:1.5rem 0;color:#94a3b8;font-size:.85rem}
</style>
</head>
<body>
<div class="card">
  <h1>Mis Tareas <span>Demo</span></h1>
  <div class="add-task">
    <input type="text" id="taskInput" placeholder="Nueva tarea..." autofocus>
    <button id="addBtn">Añadir</button>
  </div>
  <div class="filters">
    <button data-filter="all" class="active">Todas</button>
    <button data-filter="active">Pendientes</button>
    <button data-filter="done">Completadas</button>
  </div>
  <div class="task-count" id="count">0 tareas</div>
  <ul class="task-list" id="list"></ul>
</div>
<script>
let tasks = [];
let filter = 'all';
let id = Date.now();
const input = document.getElementById('taskInput');
const list = document.getElementById('list');
const count = document.getElementById('count');

function render() {
  const filtered = tasks.filter(t => filter === 'all' ? true : filter === 'done' ? t.done : !t.done);
  list.innerHTML = '';
  if (!filtered.length) { list.innerHTML = '<li class="empty">No hay tareas</li>'; }
  filtered.forEach(t => {
    const li = document.createElement('li');
    li.className = 'task-item' + (t.done ? ' done' : '');
    li.innerHTML = '<input type="checkbox" ' + (t.done ? 'checked' : '') + '>' +
      '<label>' + t.text + '</label>' +
      '<button class="del">&times;</button>';
    li.querySelector('input').onchange = () => { t.done = !t.done; render(); };
    li.querySelector('.del').onclick = () => { tasks = tasks.filter(x => x.id !== t.id); render(); };
    list.appendChild(li);
  });
  const pending = tasks.filter(t => !t.done).length;
  count.textContent = tasks.length + ' tareas (' + pending + ' pendientes)';
}

document.querySelectorAll('.filters button').forEach(btn => {
  btn.onclick = () => {
    document.querySelector('.filters .active').classList.remove('active');
    btn.classList.add('active');
    filter = btn.dataset.filter;
    render();
  };
});

document.getElementById('addBtn').onclick = () => {
  const text = input.value.trim();
  if (!text) return;
  tasks.push({ id: id++, text, done: false });
  input.value = '';
  render();
};
input.onkeydown = e => { if (e.key === 'Enter') document.getElementById('addBtn').click(); };

tasks = [
  { id: id++, text: 'Aprender JavaScript', done: true },
  { id: id++, text: 'Crear portfolio DAW', done: true },
  { id: id++, text: 'Añadir demos en vivo', done: false },
  { id: id++, text: 'Desplegar a producción', done: false }
];
render();
</script>
</body>
</html>
