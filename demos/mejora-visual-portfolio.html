<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Mejora Visual - Demo</title><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,-apple-system,sans-serif;background:#0f172a;color:#e2e8f0;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem}.card{background:#1e293b;border-radius:24px;padding:2rem;max-width:520px;width:100%}h1{font-size:1.2rem;font-weight:800;margin-bottom:.2rem}h1 span{color:#a78bfa}.sub{color:#94a3b8;font-size:.82rem;margin-bottom:1.2rem}.comparison{position:relative;background:#0f172a;border-radius:16px;overflow:hidden;height:200px;border:1px solid rgba(255,255,255,.08);margin-bottom:1rem;cursor:ew-resize;user-select:none}.before,.after{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1.1rem;letter-spacing:-.02em;padding:1rem}.before{background:linear-gradient(135deg,#1e293b,#334155);color:#94a3b8;z-index:1}.after{background:linear-gradient(135deg,#1e293b,#0f766e);color:#e2e8f0;z-index:2;clip-path:inset(0 50% 0 0)}.after .content{text-align:center}.after .badge{display:inline-block;padding:.15rem.5rem;border-radius:6px;background:#f59e0b;color:#0f172a;font-size:.65rem;font-weight:800;margin-bottom:.3rem}.slider{display:flex;align-items:center;gap:.6rem;margin-bottom:1.2rem}.slider input[type=range]{flex:1;-webkit-appearance:none;height:4px;border-radius:4px;background:rgba(255,255,255,.15);outline:0}.slider input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:#a78bfa;cursor:pointer;border:2px solid #1e293b}.slider .pct{font-size:.78rem;color:#94a3b8;font-weight:700;min-width:36px;text-align:right}.features{display:grid;grid-template-columns:1fr 1fr;gap:.4rem}.feat{font-size:.78rem;padding:.4rem.6rem;border-radius:8px;background:rgba(255,255,255,.04);color:#94a3b8;display:flex;align-items:center;gap:.3rem}.feat.done{color:#22c55e;background:rgba(34,197,94,.1)}.feat .icon{flex-shrink:0}</style></head><body><div class="card"><h1>Mejora <span>Visual</span></h1><p class="sub">Desliza para ver la transformación del portfolio</p><div class="comparison" id="comparison"><div class="before">← Antes<br><span style="font-size:.75rem;font-weight:400;opacity:.6">diseño plano básico</span></div><div class="after" id="afterLayer"><div class="content"><div class="badge">v3.11.1</div>Después →<br><span style="font-size:.75rem;font-weight:400;opacity:.8">glassmorphism + demos</span></div></div></div><div class="slider"><span style="font-size:.72rem;color:#64748b">Antes</span><input type="range" id="sliderRange" min="0" max="100" value="50"><span class="pct" id="sliderPct">50%</span></div><div class="features"><div class="feat done"><span class="icon">✓</span> Glassmorphism</div><div class="feat done"><span class="icon">✓</span> Gradientes</div><div class="feat"><span class="icon">○</span> Animaciones</div><div class="feat"><span class="icon">○</span> Micro-interacciones</div><div class="feat done"><span class="icon">✓</span> Sombras</div><div class="feat"><span class="icon">○</span> Transiciones</div></div></div><script>const slider=document.getElementById('sliderRange'),after=document.getElementById('afterLayer'),pct=document.getElementById('sliderPct');slider.addEventListener('input',()=>{const v=slider.value;after.style.clipPath='inset(0 '+(100-v)+'% 0 0)';pct.textContent=v+'%'})</script></body></html>
