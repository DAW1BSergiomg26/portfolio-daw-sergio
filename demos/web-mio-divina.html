<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Web Mío Divina - Demo</title><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,-apple-system,sans-serif;background:linear-gradient(135deg,#0f172a,#1e1b4b);color:#e2e8f0;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem}.card{background:rgba(30,27,75,.6);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.1);border-radius:24px;padding:2rem;max-width:480px;width:100%}h1{font-size:1.4rem;font-weight:800;text-align:center;margin-bottom:.3rem;background:linear-gradient(135deg,#fbbf24,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent}.sub{text-align:center;color:#94a3b8;font-size:.82rem;margin-bottom:1.5rem}.reflection-card{background:rgba(255,255,255,.05);border-radius:16px;padding:1.2rem;margin-bottom:.75rem;border:1px solid rgba(255,255,255,.06)}.reflection-card .date{font-size:.7rem;color:#64748b;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.3rem}.reflection-card p{font-size:.88rem;line-height:1.6;color:#cbd5e1}.reflection-card .ref{color:#fbbf24;font-weight:700;font-size:.78rem;margin-top:.4rem;display:block}.nav{display:flex;gap:.5rem;justify-content:center;margin-top:1rem}.nav button{width:36px;height:36px;border-radius:50%;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:#e2e8f0;cursor:pointer;font-size:.9rem;transition:background .2s}.nav button:hover{background:rgba(251,191,36,.2)}.counter{text-align:center;font-size:.78rem;color:#64748b;margin-top:.6rem}</style></head><body><div class="card"><h1>Mío Divina</h1><p class="sub">Reflexiones y contenido espiritual</p><div id="reflection-container"><div class="reflection-card"><div class="date">Reflexión 1</div><p>La fe no es un destino, sino un camino que se recorre día a día, paso a paso, con la certeza de que cada amanecer trae una nueva oportunidad para crecer.</p><span class="ref">— Inspirado en textos espirituales</span></div></div><div class="nav"><button id="prevBtn">◀</button><button id="nextBtn">▶</button></div><div class="counter" id="counter">1 / 5</div></div><script>const reflections=["La fe no es un destino, sino un camino que se recorre día a día, paso a paso, con la certeza de que cada amanecer trae una nueva oportunidad para crecer.","La misericordia es el puente que une el corazón humano con lo divino, un recordatorio de que siempre hay esperanza, incluso en los momentos más oscuros.","Cada acto de bondad es una semilla plantada en el jardín del alma. Con el tiempo, florece y da frutos que alimentan a quienes nos rodean.","La oración no cambia las circunstancias, cambia el corazón. Y un corazón transformado puede transformar el mundo.","La verdadera fortaleza no está en nunca caer, sino en levantarse cada vez con más amor, más fe y más determinación."];let idx=0;const c=document.getElementById('reflection-container'),ct=document.getElementById('counter');function render(){const r=reflections[idx];c.innerHTML='<div class="reflection-card"><div class="date">Reflexión '+(idx+1)+'</div><p>'+r+'</p><span class="ref">— Inspirado en textos espirituales</span></div>';ct.textContent=(idx+1)+' / '+reflections.length}document.getElementById('prevBtn').onclick=()=>{idx=(idx-1+reflections.length)%reflections.length;render()};document.getElementById('nextBtn').onclick=()=>{idx=(idx+1)%reflections.length;render()};</script></body></html>
