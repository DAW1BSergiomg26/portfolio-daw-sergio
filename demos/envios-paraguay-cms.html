<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Envíos Paraguay - Demo</title><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,-apple-system,sans-serif;background:#0f172a;color:#e2e8f0;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem}.card{background:#1e293b;border-radius:24px;padding:2rem;max-width:480px;width:100%}h1{font-size:1.2rem;font-weight:800;margin-bottom:.2rem}h1 span{color:#f59e0b}.sub{color:#94a3b8;font-size:.82rem;margin-bottom:1.2rem}.panel{background:#0f172a;border-radius:14px;padding:1rem;margin-bottom:1rem;border:1px solid rgba(255,255,255,.08)}.panel-title{font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;color:#64748b;font-weight:700;margin-bottom:.6rem}.record{display:grid;grid-template-columns:1fr 1fr auto;gap:.4rem;padding:.4rem 0;border-bottom:1px solid rgba(255,255,255,.06);font-size:.78rem;align-items:center}.record:last-child{border:0}.record .dest{color:#e2e8f0;font-weight:600}.record .status{padding:.15rem.4rem;border-radius:6px;font-size:.65rem;font-weight:700;text-align:center}.status.pending{background:rgba(245,158,11,.15);color:#f59e0b}.status.sent{background:rgba(59,130,246,.15);color:#93c5fd}.status.delivered{background:rgba(34,197,94,.15);color:#22c55e}.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.4rem}.stat{text-align:center;background:rgba(255,255,255,.03);border-radius:10px;padding:.6rem}.stat .num{font-size:1.1rem;font-weight:900;color:#f59e0b}.stat .label{font-size:.62rem;color:#64748b;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-top:.15rem}</style></head><body><div class="card"><h1>Envíos <span>Paraguay</span></h1><p class="sub">Panel de gestión de envíos CMS</p><div class="stats"><div class="stat"><div class="num">12</div><div class="label">Pendientes</div></div><div class="stat"><div class="num">8</div><div class="label">En tránsito</div></div><div class="stat"><div class="num">45</div><div class="label">Entregados</div></div></div><div class="panel"><div class="panel-title">Últimos envíos</div><div id="records"></div></div></div><script>const shipments=[{dest:"Asunción",status:"delivered",label:"Entregado"},{dest:"Ciudad del Este",status:"sent",label:"En tránsito"},{dest:"Encarnación",status:"pending",label:"Pendiente"},{dest:"Luque",status:"sent",label:"En tránsito"},{dest:"San Lorenzo",status:"delivered",label:"Entregado"}];const container=document.getElementById('records');container.innerHTML=shipments.map(s=>'<div class="record"><span class="dest">📦 '+s.dest+'</span><span></span><span class="status '+s.status+'">'+s.label+'</span></div>').join('')</script></body></html>
