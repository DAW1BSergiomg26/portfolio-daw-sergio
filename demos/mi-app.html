<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Mi App - Demo</title><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,-apple-system,sans-serif;background:#f8fafc;color:#0f172a;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem}.card{background:#fff;border-radius:24px;padding:2rem;max-width:420px;width:100%;box-shadow:0 4px 24px rgba(0,0,0,.06)}h1{font-size:1.2rem;font-weight:800;margin-bottom:.2rem}h1 span{background:#3b82f6;color:#fff;font-size:.6rem;padding:.15rem.45rem;border-radius:6px;font-weight:700;vertical-align:middle}.sub{color:#64748b;font-size:.82rem;margin-bottom:1rem}.screen{background:#f8fafc;border-radius:16px;padding:1rem;border:1px solid #e2e8f0;margin-bottom:1rem}.field{margin-bottom:.6rem}.field label{font-size:.72rem;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:.2rem}.field input{width:100%;padding:.5rem.75rem;border:1px solid #e2e8f0;border-radius:10px;font-size:.85rem;outline:0;transition:border .2s;font-family:inherit;background:#fff;color:#0f172a}.field input:focus{border-color:#3b82f6}.row{display:flex;gap:.4rem;margin-bottom:.6rem}.row button{flex:1;padding:.4rem;border-radius:10px;border:0;font-weight:700;font-size:.78rem;cursor:pointer;transition:all .2s;font-family:inherit}.btn-primary{background:#3b82f6;color:#fff}.btn-primary:hover{background:#2563eb}.btn-outline{background:transparent;border:1px solid #e2e8f0;color:#64748b}.btn-outline:hover{border-color:#3b82f6;color:#3b82f6}.output{background:#f1f5f9;border-radius:10px;padding:.6rem.75rem;font-size:.82rem;color:#64748b;font-family:monospace;min-height:2.5em;white-space:pre-wrap;word-break:break-all}</style></head><body><div class="card"><h1>Mi App <span>Prototipo</span></h1><p class="sub">Interfaz de prueba de concepto</p><div class="screen"><div class="field"><label>Nombre</label><input type="text" id="nameInput" placeholder="Ej: Sergio" value="Sergio"></div><div class="field"><label>Mensaje</label><input type="text" id="msgInput" placeholder="Escribe algo..." value="Hola, mundo!"></div><div class="row"><button class="btn-primary" id="showBtn">Mostrar</button><button class="btn-outline" id="clearBtn">Limpiar</button></div></div><div class="output" id="output">> Sergio dice: Hola, mundo!</div></div><script>const nameInput=document.getElementById('nameInput'),msgInput=document.getElementById('msgInput'),output=document.getElementById('output');function update(){const n=nameInput.value.trim()||'Usuario';const m=msgInput.value.trim()||'...';output.textContent='> '+n+' dice: '+m}document.getElementById('showBtn').onclick=update;document.getElementById('clearBtn').onclick=()=>{nameInput.value='';msgInput.value='';output.textContent='> ...'};nameInput.oninput=update;msgInput.oninput=update</script></body></html>
