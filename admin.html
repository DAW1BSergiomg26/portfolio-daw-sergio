<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel de administración | Portfolio DAW</title>
  <meta name="description" content="Panel interno de administración del Portfolio DAW de Sergio Daniel Martínez Gómez.">
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#070911">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" fetchpriority="high">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
  <noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet"></noscript>
  <link rel="stylesheet" href="css/styles.css?v=3.4.1">
  <link rel="stylesheet" href="css/filters.css?v=3.4.1">
  <style>
    body {
      background: #070911;
      color: var(--text);
      font-family: "Inter", sans-serif;
      margin: 0;
      min-height: 100vh;
    }
    .admin-login {
      display: grid;
      place-items: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .admin-login-card {
      width: 100%;
      max-width: 420px;
      padding: 2.5rem;
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      background: linear-gradient(145deg, var(--panel), rgba(255,255,255,0.03));
      box-shadow: var(--shadow);
    }
    .admin-login-card h1 { font-size: 1.6rem; margin-bottom: 1.5rem; color: var(--accent); }
    .admin-login-card label { display: block; margin-bottom: 0.5rem; color: var(--muted); font-weight: 600; }
    .admin-login-card input[type="password"] {
      width: 100%;
      padding: 0.9rem 1rem;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255,255,255,0.05);
      color: var(--text);
      font-size: 1rem;
      margin-bottom: 1rem;
    }
    .admin-login-error { color: #ff6b6b; margin: 0.5rem 0; font-size: 0.9rem; }
    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      padding: 1rem 2rem;
      border-bottom: 1px solid var(--line);
      background: rgba(7,9,17,0.9);
      backdrop-filter: blur(18px);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .admin-header h1 { font-size: 1.3rem; color: var(--accent); }
    .admin-actions { display: flex; align-items: center; gap: 1rem; }
    .admin-main { width: min(1160px, calc(100% - 2rem)); margin: 2rem auto; }
    .admin-tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
    .admin-tab {
      padding: 0.7rem 1.2rem;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel);
      color: var(--muted);
      font-weight: 700;
      cursor: pointer;
    }
    .admin-tab.is-active { background: var(--accent); color: #050712; }
    .admin-toolbar { display: flex; flex-wrap: wrap; gap: 0.8rem; margin-bottom: 1.5rem; align-items: center; }
    .admin-search {
      flex: 1;
      min-width: 220px;
      padding: 0.7rem 1rem;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255,255,255,0.05);
      color: var(--text);
    }
    .admin-list { display: grid; gap: 0.8rem; }
    .admin-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.2rem;
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      background: var(--panel);
    }
    .admin-item-info { display: grid; gap: 0.2rem; }
    .admin-item-info span { color: var(--muted); font-size: 0.85rem; }
    .admin-item-actions { display: flex; gap: 0.5rem; }
    .admin-form-panel {
      margin-top: 2rem;
      padding: 2rem;
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      background: var(--panel);
    }
    .admin-form { display: grid; gap: 1rem; }
    .admin-form label { color: var(--muted); font-weight: 600; font-size: 0.9rem; }
    .admin-form input, .admin-form textarea, .admin-form select {
      width: 100%;
      padding: 0.7rem 1rem;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
      color: var(--text);
      font-family: inherit;
    }
    .admin-form textarea { resize: vertical; }
    .admin-checkbox { display: flex; align-items: center; gap: 0.5rem; }
    .admin-form-actions { display: flex; gap: 0.8rem; margin-top: 1rem; }
    .admin-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
    .admin-stat-card {
      padding: 1.5rem;
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      background: var(--panel);
      text-align: center;
    }
    .admin-stat-value { display: block; font-size: 2rem; font-weight: 900; color: var(--accent); }
    .admin-stat-label { color: var(--muted); font-size: 0.9rem; }
    .admin-empty { color: var(--muted); text-align: center; padding: 2rem; }
    @media (max-width: 640px) {
      .admin-header { flex-direction: column; align-items: flex-start; }
      .admin-item { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <script src="js/admin.js?v=3.4.1" defer></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(reg => console.log('[SW] Registrado:', reg.scope))
          .catch(err => console.error('[SW] Error al registrar:', err));
      });
    }
  </script>
</body>
</html>
