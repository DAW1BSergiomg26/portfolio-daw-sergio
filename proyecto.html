<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proyecto | Portfolio DAW | Sergio Daniel Martínez Gómez</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/styles.css?v=3.1.0">
  <link rel="stylesheet" href="css/filters.css?v=3.1.0">
  <style>
    body {
      background: radial-gradient(circle at top left, rgba(125, 211, 252, 0.1), transparent 30rem),
                  radial-gradient(circle at top right, rgba(167, 139, 250, 0.08), transparent 30rem),
                  #070911;
      color: var(--text);
      font-family: "Inter", sans-serif;
      margin: 0;
      padding: 0;
    }
    .project-page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 2rem 0;
    }
    .project-page-container {
      max-width: 900px;
      margin: 0 auto 4rem;
      padding: 2rem;
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }
    .project-page-content {
      background: var(--panel);
      padding: 3rem;
      border-radius: var(--radius-lg);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }
    h1 { font-size: 2.5rem; margin: 1rem 0; color: var(--accent); }
    .project-kicker { color: var(--accent-2); font-weight: 700; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 0.1em; }
    .project-meta { display: flex; flex-wrap: wrap; gap: 1rem; margin: 1.5rem 0; color: var(--muted); }
    .project-meta span { background: rgba(255,255,255,0.05); padding: 0.4rem 0.8rem; border-radius: 8px; font-size: 0.9rem; }
    h3 { margin-top: 2.5rem; color: var(--text); }
    .tech-chips { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 1rem; }
    .tech-chips span { background: var(--panel-strong); padding: 0.4rem 0.8rem; border-radius: 8px; font-size: 0.85rem; }
    .project-links { margin-top: 2rem; display: flex; flex-wrap: wrap; gap: 1rem; }
    .project-links a { background: var(--accent); color: #000; padding: 0.8rem 1.5rem; border-radius: 12px; text-decoration: none; font-weight: 700; }
  </style>
</head>
<body>
  <div class="project-page-header">
    <a href="index.html" class="back-link" data-i18n="project_page_back">← Volver al catálogo</a>
    <div class="lang-switcher" role="group" aria-label="Selector de idioma">
      <button type="button" class="lang-btn" data-lang="es" onclick="setLanguage('es')" data-i18n="lang_es">ES</button>
      <button type="button" class="lang-btn" data-lang="en" onclick="setLanguage('en')" data-i18n="lang_en">EN</button>
    </div>
  </div>
  <div class="project-page-container">
    <main id="project-container" class="project-page-content">
      <div style="text-align: center; padding: 4rem;" data-i18n="project_page_loading">Cargando detalles profesionales...</div>
    </main>
  </div>
  <script src="js/proyecto.js?v=3.1.0" defer></script>
</body>
</html>
