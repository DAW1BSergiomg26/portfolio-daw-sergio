<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog | Portfolio DAW | Sergio Daniel Martínez Gómez</title>
  <meta name="description" content="Blog técnico del Portfolio DAW de Sergio Daniel Martínez Gómez: apuntes sobre desarrollo web, DAW, Git, JavaScript y buenas prácticas.">
  <meta name="author" content="Sergio Daniel Martínez Gómez">
  <meta name="theme-color" content="#070911">
  <link rel="canonical" href="https://daw1bsergiomg26.github.io/portfolio-daw-sergio/entrada.html">
  <link rel="alternate" hreflang="es" href="https://daw1bsergiomg26.github.io/portfolio-daw-sergio/entrada.html">
  <link rel="alternate" hreflang="en" href="https://daw1bsergiomg26.github.io/portfolio-daw-sergio/entrada.html?lang=en">
  <link rel="alternate" hreflang="x-default" href="https://daw1bsergiomg26.github.io/portfolio-daw-sergio/entrada.html">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="favicon.svg">
  <link rel="manifest" href="site.webmanifest">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" fetchpriority="high">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
  <noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet"></noscript>
  <link rel="stylesheet" href="css/styles.css?v=3.4.1">
  <link rel="stylesheet" href="css/filters.css?v=3.4.1">
  <style>
    body {
      background: radial-gradient(circle at top left, rgba(125, 211, 252, 0.1), transparent 30rem),
                  radial-gradient(circle at top right, rgba(167, 139, 250, 0.08), transparent 30rem),
                  #070911;
      color: var(--text);
      font-family: "Inter", sans-serif;
      margin: 0;
      padding: 0;
    }
    .blog-page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 800px;
      margin: 0 auto;
      padding: 2rem 2rem 0;
    }
    .blog-page-container {
      max-width: 800px;
      margin: 0 auto 4rem;
      padding: 2rem;
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }
    .blog-post {
      background: var(--panel);
      padding: 3rem;
      border-radius: var(--radius-lg);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }
    .blog-post-header { margin-bottom: 2rem; }
    .blog-post-header h1 { font-size: 2.2rem; margin: 1rem 0; color: var(--accent); line-height: 1.2; }
    .blog-post-category {
      display: inline-block;
      background: var(--accent);
      color: #000;
      padding: 0.3rem 0.8rem;
      border-radius: 8px;
      font-size: 0.75rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 1rem;
    }
    .blog-post-meta {
      display: flex;
      gap: 0.5rem;
      color: var(--muted);
      font-size: 0.9rem;
    }
    .blog-post-content {
      font-size: 1.05rem;
      line-height: 1.8;
      color: var(--text);
    }
    .blog-post-content p { margin: 1.2rem 0; }
    .blog-post-content strong { color: var(--accent); }
    .blog-post-content code {
      background: rgba(255,255,255,0.08);
      padding: 0.15rem 0.4rem;
      border-radius: 6px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 0.9em;
    }
    .blog-post-footer {
      margin-top: 3rem;
      padding-top: 2rem;
      border-top: 1px solid var(--line);
    }
    .blog-tags { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.8rem; }
    .blog-tag {
      background: var(--panel-strong);
      color: var(--text);
      padding: 0.4rem 0.8rem;
      border-radius: 8px;
      font-size: 0.85rem;
    }
    .blog-error { text-align: center; padding: 4rem 2rem; }
    .blog-loading { text-align: center; padding: 4rem 2rem; color: var(--muted); }
    @media (max-width: 640px) {
      .blog-post { padding: 1.8rem; }
      .blog-post-header h1 { font-size: 1.7rem; }
    }
  </style>
</head>
<body>
  <div class="blog-page-header">
    <a href="index.html#blog" class="back-link" data-i18n="blog_back">← Volver al blog</a>
    <div class="lang-switcher" role="group" aria-label="Selector de idioma">
      <button type="button" class="lang-btn" data-lang="es" onclick="setLanguage('es')" data-i18n="lang_es">ES</button>
      <button type="button" class="lang-btn" data-lang="en" onclick="setLanguage('en')" data-i18n="lang_en">EN</button>
    </div>
  </div>
  <div class="blog-page-container">
    <main id="blog-post-container" class="blog-post">
      <div class="blog-loading" data-i18n="blog_post_loading">Cargando artículo...</div>
    </main>
  </div>
  <script src="js/blog.js?v=3.4.1" defer></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(reg => console.log('[SW] Registrado:', reg.scope))
          .catch(err => console.error('[SW] Error al registrar:', err));
      });
    }
  </script>
</body>
</html>
