<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Portfolio DAW - Sergio Daniel Martínez Gómez</title>
  <desc id="desc">Imagen Open Graph del portfolio DAW con proyectos web, JSON, filtros y GitHub Pages.</desc>
  <defs>
