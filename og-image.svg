      <stop offset="0%" stop-color="#070911"/>
      <stop offset="52%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#172033"/>
    </linearGradient>
    <radialGradient id="glowA" cx="20%" cy="15%" r="55%">
